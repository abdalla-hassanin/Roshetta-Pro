name: roshetta_pro
description: A new Flutter project.
publish_to: 'none'

version: 1.0.5+5

environment:
  sdk: ">=2.16.1 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.17.0
  bloc: ^7.0.0
  flutter_bloc: ^7.0.0
  shared_preferences: ^2.0.6
  fluttertoast: ^8.0.8
  firebase_core: ^1.5.0
  firebase_auth: ^3.0.2
  cloud_firestore: ^2.5.3
  image_picker: ^0.8.3+3
  firebase_storage: ^10.0.3
  firebase_messaging: ^10.0.8
  full_screen_image_null_safe: any
  uuid: 3.0.5
  easy_localization: ^3.0.0
  google_fonts: ^2.1.0
  expansion_widget: ^0.0.2
  animated_splash_screen: ^1.1.0
  hexcolor: ^2.0.3
  lottie: ^1.2.1
  iconify_flutter: ^0.0.3
  pull_to_refresh: ^2.0.0
  numberpicker: ^2.1.1
  url_launcher: ^6.0.20

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.0

flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/specialty/
    - assets/translations/
    - assets/animation/
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 300
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 600
        - asset: assets/fonts/Tajawal-Black.ttf
          weight: 900

    - family: SST_Arabic
      fonts:
        - asset: assets/fonts/sst_arabic.ttf
